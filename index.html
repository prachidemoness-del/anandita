<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anandita ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen">
  <button id="start-btn">❤️ Open Birthday Surprise ❤️</button>
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<section id="hero" class="screen active">
  <h1>Happy Birthday Anandita ❤️</h1>
</section>

<section id="months" class="screen">
  <div class="month-list">
    <div>JANUARY</div>
    <div>FEBRUARY</div>
    <div>MARCH</div>
    <div>APRIL</div>
    <div>MAY</div>
    <div>JUNE</div>
    <div class="active-month">JULY ❤️</div>
    <div>AUGUST</div>
    <div>SEPTEMBER</div>
    <div>OCTOBER</div>
    <div>NOVEMBER</div>
    <div>DECEMBER</div>
  </div>
</section>

<section id="date" class="screen">
  <h2>JULY</h2>
  <div class="big-date">7</div>
</section>

<section id="gallery" class="screen">
  <div class="gallery-grid">
    <img src="photos/photo1.jpg">
    <img src="photos/photo2.jpg">
    <img src="photos/photo3.jpg">
    <img src="photos/photo4.jpg">
    <img src="photos/photo5.jpg">
    <img src="photos/photo6.jpg">
    <img src="photos/photo7.jpg">
    <img src="photos/photo8.jpg">
    <img src="photos/photo9.jpg">
    <img src="photos/photo10.jpg">
    <img src="photos/photo11.jpg">
    <img src="photos/photo12.jpg">
    <img src="photos/photo13.jpg">
    <img src="photos/photo14.jpg">
    <img src="photos/photo15.jpg">
  </div>
</section>

<section id="final" class="screen">
  <h1>Happy Birthday Anandita ❤️</h1>
  <p>July 7 ✨</p>
  <p>You Mean So Much To Me 💖</p>
  <p>Forever & Always ❤️</p>
</section>

<script src="script.js"></script>

</body>
</html>
